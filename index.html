<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟値段出し🌟</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f7f4ff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

h1{
    text-align:center;
    color:#7a4cff;
}

.item{
    background:white;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.name{
    font-size:20px;
    font-weight:bold;
}

.controls{
    display:flex;
    align-items:center;
    gap:12px;
}

button{
    width:48px;
    height:48px;
    border:none;
    border-radius:50%;
    font-size:26px;
    background:#7a4cff;
    color:white;

    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

button:active{
    transform:scale(.95);
}

.count{
    width:35px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.reset{
    width:100%;
    height:55px;
    margin-top:20px;
    border-radius:16px;
    font-size:20px;
    background:#ff5b8a;
}
</style>

</head>
<body>

<h1>値段出し</h1>

<div id="list"></div>

<button class="reset" onclick="toggleScreenshot()">
スクショ
</button>

<button class="reset" onclick="resetAll()">


リセット
</button>
    
<script>

const items=[
"10円",
"20円",
"30円",
"40円",
"60円",
"80円",
"120円",
"180円",
"250円",
"300円",
"500円",
"700円",
"900円",
"1200円",
"マンテル120",
"マンテル180",
"金具50",
"金具80",
"金具120"
];

let counts={};
    let screenshotMode = false;

items.forEach(item=>{
    counts[item]=0;
});

const list=document.getElementById("list");

function draw(){

    list.innerHTML="";

    items.forEach(item=>{

        const div=document.createElement("div");
        div.className="item";

        if(screenshotMode){

    if(counts[item]==0) return;

    div.innerHTML=`
        <div class="name">${item}</div>
        <div class="count">${counts[item]}</div>
    `;

}else{

    div.innerHTML=`
        <div class="name">${item}</div>

        <div class="controls">

            <button onclick="minus('${item}')">−</button>

            <div class="count">${counts[item]}</div>

            <button onclick="plus('${item}')">＋</button>

        </div>
    `;

}
    

        list.appendChild(div);

    });

}

function plus(item){

    counts[item]++;

    save();

    draw();

}
function minus(item){

    if(counts[item]>0){

        counts[item]--;

        save();

        draw();

    }

}

function save(){

    localStorage.setItem(
        "partsCounter",
        JSON.stringify(counts)
    );

}

function load(){

    const data=localStorage.getItem("partsCounter");

    if(data){

        counts=JSON.parse(data);

    }

}

function resetAll(){

    if(confirm("すべてリセットしますか？")){

        items.forEach(item=>{

            counts[item]=0;

        });

        save();

        draw();

    }

}

function toggleScreenshot(){

    screenshotMode = !screenshotMode;

    draw();

}

load();

draw();

    }

}
load();

draw();

</script>

</body>
</html>
